# Prices for products. Link's before_validation :associate_price hook
# normally creates these; fixtures bypass it, so we inline.

named_seller_product_price:
  link_id: <%= ActiveRecord::FixtureSet.identify(:named_seller_product) %>
  price_cents: 100
  currency: usd
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>
  flags: 0

