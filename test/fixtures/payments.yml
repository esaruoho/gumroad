  user_id: <%= ActiveRecord::FixtureSet.identify(:basic_user) %>
  state: processing
  processor: "PAYPAL"
  correlation_id: failure-reason-test
  amount_cents: 100
  payout_period_end_date: <%= Date.yesterday %>
  created_at: <%= 1.day.ago %>
  updated_at: <%= 1.day.ago %>

