# Fixtures for PublicFile (app/models/public_file.rb).
# resource is polymorphic; here we use the existing named_seller_product Link.
# `file` attachment must be attached in test setup (Active Storage callbacks
# don't fire from fixtures, and the actual blob bytes need to be wired up).

scheduled_past:
  seller_id: <%= ActiveRecord::FixtureSet.identify(:named_seller) %>
  resource_type: Link
  resource_id: <%= ActiveRecord::FixtureSet.identify(:named_seller_product) %>
  public_id: pubfilescheduled
  display_name: Scheduled past
  original_file_name: test.mp3
  file_type: mp3
  file_group: audio
  scheduled_for_deletion_at: <%= 1.day.ago %>
  created_at: <%= 2.days.ago %>
  updated_at: <%= 2.days.ago %>

