# OAuth applications used by AuthPresenter tests.

auth_presenter_app:
  name: Test App
  uid: <%= SecureRandom.hex(20) %>
  secret: <%= SecureRandom.hex(20) %>
  redirect_uri: https://foo
  scopes: "edit_products view_sales mark_sales_as_shipped edit_sales revenue_share ifttt view_profile view_payouts view_tax_data account"
  confidential: true
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>

# Notion OAuth app owned by named_seller — used by
# Oauth::Notion::AuthorizationsControllerTest.
notion_app_for_named_seller:
  name: Notion App
  uid: <%= SecureRandom.hex(20) %>
  secret: <%= SecureRandom.hex(20) %>
  redirect_uri: https://example.com
  scopes: "unfurl"
  confidential: true
  owner_id: <%= ActiveRecord::FixtureSet.identify(:named_seller) %>
  owner_type: User
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>
