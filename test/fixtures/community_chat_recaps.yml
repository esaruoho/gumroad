# CommunityChatRecapMailerTest fixtures.

daily_snap_recap:
  community_chat_recap_run_id: <%= ActiveRecord::FixtureSet.identify(:daily_recap_run) %>
  community_id: <%= ActiveRecord::FixtureSet.identify(:snap_app_community) %>
  seller_id: <%= ActiveRecord::FixtureSet.identify(:community_recap_seller) %>
  summarized_message_count: 10
  summary: "<ul><li>Creator welcomed everyone to the community.</li><li>A customer asked about using <strong>a specific feature</strong>.</li><li>Creator provided detailed instructions on how to use the feature.</li><li>Two customers expressed their gratitude for the information and help.</li></ul>"
  status: finished
  input_token_count: 1000
  output_token_count: 200
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>

