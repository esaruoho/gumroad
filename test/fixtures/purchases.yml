named_seller_call_purchase:
  seller_id: <%= ActiveRecord::FixtureSet.identify(:named_seller) %>
  link_id: <%= ActiveRecord::FixtureSet.identify(:named_seller_product) %>
  email: buyer1@example.com
  price_cents: 100
  total_transaction_cents: 100
  displayed_price_cents: 100
  displayed_price_currency_type: usd
  purchase_state: successful
  succeeded_at: <%= Time.current %>
