named_seller_call:
  purchase_id: <%= ActiveRecord::FixtureSet.identify(:named_seller_call_purchase) %>
  call_url: https://zoom.us/j/gmrd
  start_time: <%= 1.day.from_now %>
  end_time: <%= 1.day.from_now + 30.minutes %>
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>

another_seller_call:
  purchase_id: <%= ActiveRecord::FixtureSet.identify(:another_seller_call_purchase) %>
  call_url: https://zoom.us/j/other
  start_time: <%= 2.days.from_now %>
  end_time: <%= 2.days.from_now + 30.minutes %>
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>
