# Affiliate is STI. `Collaborator` is the subclass used by LinkPolicy specs.
# Join to products lives in test/fixtures/affiliates_links.yml (table `affiliates_links`).

collaborator_for_named_seller_product:
  type: Collaborator
  seller_id: <%= ActiveRecord::FixtureSet.identify(:named_seller) %>
  affiliate_user_id: <%= ActiveRecord::FixtureSet.identify(:collaborating_user) %>
  affiliate_basis_points: 1000
  flags: 0
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>
