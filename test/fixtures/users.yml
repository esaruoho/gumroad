# Fixture conventions:
# - `password` for every account is "password"
# - encrypted_password is the bcrypt hash of "password" with test-env stretches
# - external_id is set explicitly; Devise's before_save callback won't fire on fixtures
# - recommendation_type is required (not-null in schema)

DEFAULTS: &defaults
  encrypted_password: "$2a$04$3jn2Gtw779BQ6pd6MxfnDOPS1oJTSgz593uO.bvmnXSicXAVogBmK"
  confirmed_at: <%= Time.current %>
  user_risk_state: not_reviewed
  recommendation_type: own_products
  currency_type: usd
  locale: en
  # flags: bit 1 announcement_notification_enabled | bit 7 refund_fee_notice_shown |
  # bit 19 pre_signup_affiliate_request_processed | bit 46 refund_policy_enabled
  flags: <%= 1 | (1 << 6) | (1 << 18) | (1 << 45) %>
  timezone: "Pacific Time (US & Canada)"
  notification_content_type: "application/x-www-form-urlencoded"

# Plain seller, no associations.
seller_one:
  <<: *defaults
  email: seller_one@example.com
  username: sellerone
  external_id: ext_seller_one
  payment_address: seller_one_payouts@example.com

# Plain seller, alternate email/username.
seller_two:
  <<: *defaults
  email: seller_two@example.com
  username: sellertwo
  external_id: ext_seller_two
  payment_address: seller_two_payouts@example.com

# Equivalent of FactoryBot `:named_seller`.
named_seller:
  <<: *defaults
  email: seller@example.com
  username: seller
  external_id: ext_named_seller
  name: "Seller"
  payment_address: seller_payout@example.com

# Equivalent of FactoryBot `:named_user`.
named_user:
  <<: *defaults
  email: gumbot@example.com
  username: gumbot
  external_id: ext_named_user
  name: "Gumbot"
  payment_address: gumbot_payout@example.com

# Admin user. Inherits default flags + is_team_member bit (28).
admin:
  <<: *defaults
  email: admin@example.com
  username: admin
  external_id: ext_admin
  flags: <%= 1 | (1 << 6) | (1 << 18) | (1 << 27) | (1 << 45) %>

