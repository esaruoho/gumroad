# Owner + non-owner team memberships for the policy test users.
#
# Every seller needs an owner-role self-membership (TeamMembership validation
# `owner_membership_must_exist` enforces this for any non-owner role to be
# valid). Factory code in spec/ does this via a `before(:create)` hook;
# fixtures inline it.

# Owner self-membership for named_seller (required so the non-owner roles below
# pass `owner_membership_must_exist` validation when they're loaded against the
# same seller).
named_seller_owner:
  user: named_seller
  seller_id: <%= ActiveRecord::FixtureSet.identify(:named_seller) %>
  role: owner
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>

accountant_for_named_seller_membership:
  user: accountant_for_named_seller
  seller_id: <%= ActiveRecord::FixtureSet.identify(:named_seller) %>
  role: accountant
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>

admin_for_named_seller_membership:
  user: admin_for_named_seller
  seller_id: <%= ActiveRecord::FixtureSet.identify(:named_seller) %>
  role: admin
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>

marketing_for_named_seller_membership:
  user: marketing_for_named_seller
  seller_id: <%= ActiveRecord::FixtureSet.identify(:named_seller) %>
  role: marketing
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>

support_for_named_seller_membership:
  user: support_for_named_seller
  seller_id: <%= ActiveRecord::FixtureSet.identify(:named_seller) %>
  role: support
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>

# Team presenter fixtures: team_presenter_seller (owner) + team_presenter_member
# (admin) + one soft-deleted admin membership for the same pair.
# Also: team_presenter_seller is itself a non-owner of team_presenter_other_owner's
# team, which must NOT appear in team_presenter_seller's member_infos.
team_presenter_seller_owner:
  user: team_presenter_seller
  seller_id: <%= ActiveRecord::FixtureSet.identify(:team_presenter_seller) %>
  role: owner
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>

team_presenter_active_membership:
  user: team_presenter_member
  seller_id: <%= ActiveRecord::FixtureSet.identify(:team_presenter_seller) %>
  role: admin
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>

team_presenter_deleted_membership:
  user: team_presenter_member
  seller_id: <%= ActiveRecord::FixtureSet.identify(:team_presenter_seller) %>
  role: admin
  deleted_at: <%= Time.current %>
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>

team_presenter_other_owner_self:
  user: team_presenter_other_owner
  seller_id: <%= ActiveRecord::FixtureSet.identify(:team_presenter_other_owner) %>
  role: owner
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>

# team_presenter_seller is a non-owner of team_presenter_other_owner's team —
# should NOT show up in team_presenter_seller's own member_infos.
team_presenter_seller_in_other_team:
  user: team_presenter_seller
  seller_id: <%= ActiveRecord::FixtureSet.identify(:team_presenter_other_owner) %>
  role: admin
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>

