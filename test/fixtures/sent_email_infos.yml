# Sent email info rows used by DeleteOldSentEmailInfoRecordsJobTest. The job
# deletes rows older than 1 year; we seed a 3-year-old, 2-year-old, and a
# 6-month-old to verify only the recent row survives.

three_year_old_sent_email_info:
  key: sent-email-info-three-year-old
  created_at: <%= 3.years.ago %>
  updated_at: <%= 3.years.ago %>

two_year_old_sent_email_info:
  key: sent-email-info-two-year-old
  created_at: <%= 2.years.ago %>
  updated_at: <%= 2.years.ago %>

recent_sent_email_info:
  key: sent-email-info-recent
  created_at: <%= 6.months.ago %>
  updated_at: <%= 6.months.ago %>
