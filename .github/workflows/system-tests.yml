name: System Tests (Minitest + Playwright)

# New test/system/ suite. Runs in parallel with the existing RSpec workflow
# until parity is reached and the old RSpec system suite is deleted.

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "production-*"
  pull_request_target:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request_target' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request_target' || github.ref != 'refs/heads/main' }}

jobs:
  ci_gate:
    name: CI Gate${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name == github.repository && ' (internal PR noop)' || '' }}
    # Mirrors the gate in tests.yml: fork PRs require manual approval before
    # any job running with pull_request_target can see secrets. Internal PRs
    # noop here because the `push` event already covers them.
    runs-on: ubuntu-22.04
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && 'ci-protected' || '' }}
    steps:
      - run: true

  test_system:
    name: System Tests${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name == github.repository && ' (internal PR noop)' || '' }}
    needs: ci_gate
    # Skip on internal PRs that already get covered by the push event on the
    # branch (matches the pattern used in tests.yml).
    if: ${{ github.event_name != 'pull_request_target' || github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.0.32
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: gumroad_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
      mongo:
        image: mongo:4.0.19
        ports:
          - 27017:27017
      elasticsearch:
        image: elasticsearch:7.17.18
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports:
          - 9200:9200
      memcached:
        image: memcached:latest
        ports:
          - 11211:11211

    env:
      RAILS_ENV: test
      BUNDLE_GEMS__CONTRIBSYS__COM: ${{ secrets.BUNDLE_GEMS__CONTRIBSYS__COM }}
      # .env.test sets DATABASE_*, MONGO_*, REDIS_*, ELASTICSEARCH_*, etc.
      # dotenv-rails loads it when RAILS_ENV=test. We only override the
      # MYSQL password here because .env.test expects "password" matching
      # the dev compose, and our service container is configured the same.

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        # Required because Vite (config/vite.json: autoBuild: true for the
        # `test` env) lazy-compiles assets on first request. Tests pay a
        # one-time ~30s cost for the first React route hit; subsequent
        # hits use the disk cache. Kept identical to dev mode on purpose.
        run: npm ci

      - name: Prepare database
        run: bundle exec rake db:prepare

      - name: Generate JS routes + JSON schemas
        # `rake js:export` (also wrapped by `npm run setup`) generates
        # app/javascript/utils/routes.js + routes.d.ts and the JSON-schema
        # TS shims. Both are gitignored, so Vite cold-starts without them
        # and dies on the first /signup or /login hit ("can't find
        # entrypoints/design.ts in the manifests" → Vite build fails on
        # missing utils/routes import). Needs DB ready first.
        run: bundle exec rake js:export
        env:
          RAILS_ENV: test

      - name: Install Playwright Chromium
        timeout-minutes: 5
        run: npx --yes playwright@1.60.0 install --with-deps chromium

      - name: Start Vite dev server
        # Long-running dev daemon — matches local dev (`foreman start`).
        # autoBuild=true (config/vite.json test env) spawns a fresh build
        # subprocess per request; under CI's pipe semantics those subprocesses
        # close their stdout mid-stream and the vite_ruby IO threads die with
        # "stream closed in another thread", which knocks out subsequent
        # requests and times out Playwright. A persistent `bin/vite dev`
        # keeps the pipes open and serves chunks incrementally, exactly like
        # local development. vite_ruby auto-detects the running dev server
        # on port 3037 and routes asset URLs through it.
        run: |
          mkdir -p log tmp
          nohup bin/vite dev --mode test > log/vite-dev.log 2>&1 &
          echo $! > tmp/vite-dev.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3037/vite-test/@vite/client > /dev/null; then
              echo "vite dev ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "vite dev failed to start in 60s"
          cat log/vite-dev.log
          exit 1
        env:
          RAILS_ENV: test

      - name: Run system tests
        timeout-minutes: 10
        run: bin/test-system

      - name: Archive test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-tests-logs-attempt-${{ github.run_attempt }}
          path: log/
          retention-days: 7
          if-no-files-found: ignore
