development: &development
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_unicode_ci
  database: <%= ENV.fetch("DATABASE_NAME") %>
  host: <%= ENV.fetch("DATABASE_HOST") %>
  port: <%= ENV.fetch("DATABASE_PORT") %>
  # Pool size historically had to exceed Sidekiq concurrency under Makara. We're
  # keeping the same heuristic for now; revisit when adopting Rails' built-in
  # role-based connection switching.
  pool: <%= ENV["DB_POOL_SIZE"].presence || ENV["RAILS_MAX_THREADS"].presence || 5 %>
  <%= "reconnect: true" unless ENV["SKIP_NATIVE_MYSQL_RECONNECT"] == "true" %>
  socket: <%= [
  '/var/run/mysqld/mysqld.sock',
  '/var/lib/mysql/mysql.sock',
  '/tmp/mysqld.sock',
  '/tmp/mysql.sock'].detect { |socket| File.exist?(socket) } %>
  username: <%= ENV.fetch("DATABASE_USERNAME") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "") %>
  variables:
    max_execution_time: <%= 5 * 60000 %> # 5 minutes
    sql_mode: 'NO_ENGINE_SUBSTITUTION'

test:
  <<: *development
  database: <%= ENV.fetch("TEST_DATABASE_NAME", "gumroad_test") %>

staging: &staging
  <<: *development

production:
  <<: *staging
